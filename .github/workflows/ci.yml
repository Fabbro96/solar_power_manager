name: Flutter CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Clean stale build artifacts
        if: github.event_name == 'push'
        run: rm -rf build/app/outputs

      - name: Build Android APK
        if: github.event_name == 'push'
        run: flutter build apk --release --split-per-abi --no-pub

      - name: Locate generated APK
        if: github.event_name == 'push'
        id: locate_apk
        shell: bash
        run: |
          set -euo pipefail

          APK_PATH="$(find build/app/outputs -type f -name '*arm64-v8a-release.apk' | head -n 1 || true)"
          if [[ -z "$APK_PATH" ]]; then
            APK_PATH="$(find build/app/outputs -type f -name '*.apk' | head -n 1 || true)"
          fi
          if [[ -z "$APK_PATH" ]]; then
            echo "No APK found under build/app/outputs"
            find build/app/outputs -maxdepth 5 -type f | sort
            exit 1
          fi

          APP_VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          SAFE_VERSION="${APP_VERSION//+/--build-}"
          VERSIONED_APK="build/app/outputs/solar-power-manager-${SAFE_VERSION}.apk"

          cp "$APK_PATH" "$VERSIONED_APK"

          echo "artifact_apk_path=$VERSIONED_APK" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved artifact APK: $VERSIONED_APK"
          echo "Source APK selected: $APK_PATH"

      - name: Upload Android APK artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: solar-power-manager-${{ steps.locate_apk.outputs.app_version }}
          path: ${{ steps.locate_apk.outputs.artifact_apk_path }}
          if-no-files-found: error
