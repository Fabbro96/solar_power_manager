name: Flutter CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Android APK
        if: github.event_name == 'push'
        run: flutter build apk --release

      - name: Locate generated APK
        if: github.event_name == 'push'
        id: locate_apk
        shell: bash
        run: |
          set -euo pipefail

          APK_PATH="$(find build/app/outputs -type f -name '*.apk' | head -n 1 || true)"
          if [[ -z "$APK_PATH" ]]; then
            echo "No APK found under build/app/outputs"
            find build/app/outputs -maxdepth 5 -type f | sort
            exit 1
          fi

          NORMALIZED_APK="build/app/outputs/solar-power-manager-${GITHUB_SHA::7}-release.apk"
          cp "$APK_PATH" "$NORMALIZED_APK"

          echo "apk_path=$NORMALIZED_APK" >> "$GITHUB_OUTPUT"
          echo "Resolved APK: $NORMALIZED_APK"

      - name: Upload Android APK artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: solar-power-manager-apk-${{ github.sha }}
          path: ${{ steps.locate_apk.outputs.apk_path }}
          if-no-files-found: error

      - name: Publish APK to latest prerelease
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: latest-apk
          name: Latest APK
          prerelease: true
          target_commitish: ${{ github.sha }}
          body: |
            Automated APK build from `${{ github.ref_name }}`.
            Commit: `${{ github.sha }}`
          files: ${{ steps.locate_apk.outputs.apk_path }}
