name: Flutter CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Clean stale build artifacts
        if: github.event_name == 'push'
        run: rm -rf build/app/outputs

      - name: Build Android APK
        if: github.event_name == 'push'
        run: flutter build apk --release --split-per-abi --no-pub

      - name: Locate generated APK
        if: github.event_name == 'push'
        id: locate_apk
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t APK_PATHS < <(find build/app/outputs -type f -name '*.apk' | sort)
          if [[ "${#APK_PATHS[@]}" -eq 0 ]]; then
            echo "No APK found under build/app/outputs"
            find build/app/outputs -maxdepth 5 -type f | sort
            exit 1
          fi

          APP_VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          SAFE_VERSION="${APP_VERSION//+/--build-}"
          RELEASE_DIR="build/app/github-release-assets"
          mkdir -p "$RELEASE_DIR"

          manifest_path="$RELEASE_DIR/apk-list.txt"
          : > "$manifest_path"

          for apk in "${APK_PATHS[@]}"; do
            base_name="$(basename "$apk")"
            abi="universal"
            for candidate in armeabi-v7a arm64-v8a x86_64 x86; do
              if [[ "$base_name" == *"${candidate}"* ]]; then
                abi="$candidate"
                break
              fi
            done

            versioned_apk="$RELEASE_DIR/solar-power-manager-${SAFE_VERSION}-${abi}.apk"
            cp "$apk" "$versioned_apk"
            echo "$versioned_apk" >> "$manifest_path"
            echo "Prepared asset: $versioned_apk"
          done

          echo "artifact_dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_manifest=$manifest_path" >> "$GITHUB_OUTPUT"

      - name: Upload Android APK artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: solar-power-manager-${{ steps.locate_apk.outputs.app_version }}
          path: ${{ steps.locate_apk.outputs.artifact_dir }}
          if-no-files-found: error

      - name: Publish rolling prerelease APKs
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          APP_VERSION="${{ steps.locate_apk.outputs.app_version }}"
          RELEASE_TAG="latest-apk"
          RELEASE_TITLE="Latest APK"
          NOTES="Rolling prerelease built from ${GITHUB_SHA}.\nApp version: ${APP_VERSION}"

          mapfile -t ASSETS < "${{ steps.locate_apk.outputs.artifact_manifest }}"
          if [[ "${#ASSETS[@]}" -eq 0 ]]; then
            echo "No prepared APK assets found"
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${ASSETS[@]}" --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes "$NOTES" --prerelease
          else
            gh release create "$RELEASE_TAG" "${ASSETS[@]}" \
              --title "$RELEASE_TITLE" \
              --target "$GITHUB_SHA" \
              --notes "$NOTES" \
              --prerelease
          fi
