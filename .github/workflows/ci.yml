name: Flutter CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Android APK
        if: github.event_name == 'push'
        run: flutter build apk --release

      - name: Locate generated APK
        if: github.event_name == 'push'
        id: locate_apk
        shell: bash
        run: |
          set -euo pipefail

          APK_PATH="$(find build/app/outputs -type f -name '*.apk' | head -n 1 || true)"
          if [[ -z "$APK_PATH" ]]; then
            echo "No APK found under build/app/outputs"
            find build/app/outputs -maxdepth 5 -type f | sort
            exit 1
          fi

          NORMALIZED_APK="build/app/outputs/solar-power-manager-${GITHUB_SHA::7}-release.apk"
          cp "$APK_PATH" "$NORMALIZED_APK"

          echo "apk_path=$NORMALIZED_APK" >> "$GITHUB_OUTPUT"
          echo "Resolved APK: $NORMALIZED_APK"

      - name: Upload Android APK artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: solar-power-manager-apk-${{ github.sha }}
          path: ${{ steps.locate_apk.outputs.apk_path }}
          if-no-files-found: error

      - name: Publish APK to latest prerelease
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          APK_PATH: ${{ steps.locate_apk.outputs.apk_path }}
        shell: bash
        run: |
          set -euo pipefail

          NOTES="Automated APK build from ${GITHUB_REF_NAME}.\nCommit: ${GITHUB_SHA}"

          if gh release view latest-apk >/dev/null 2>&1; then
            gh release upload latest-apk "$APK_PATH" --clobber
            gh release edit latest-apk \
              --title "Latest APK" \
              --prerelease \
              --target "$GITHUB_SHA" \
              --notes "$NOTES"
          else
            gh release create latest-apk "$APK_PATH" \
              --title "Latest APK" \
              --prerelease \
              --target "$GITHUB_SHA" \
              --notes "$NOTES"
          fi
