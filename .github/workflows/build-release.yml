name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi --no-pub

      - name: Verify build output
        run: |
          set -euo pipefail
          echo "=== Android build directory structure ==="
          find build/app -type f -name '*.apk' 2>/dev/null | sort || echo "No APKs found"
          echo ""
          echo "=== Full outputs directory ==="
          find build/app/outputs -type f 2>/dev/null | sort | head -20 || echo "No outputs directory"

      - name: Publish versioned APK on tag release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"
          APP_VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          APK_PATH="$(find build/app/outputs -type f -name '*arm64-v8a-release.apk' | head -n 1 || true)"
          if [[ -z "$APK_PATH" ]]; then
            APK_PATH="$(find build/app/outputs -type f -name '*.apk' | head -n 1 || true)"
          fi
          if [[ -z "$APK_PATH" ]]; then
            echo "No APK found under build/app/outputs"
            find build/app/outputs -maxdepth 5 -type f | sort
            exit 1
          fi

          ASSET_NAME="solar-power-manager-${TAG_NAME}.apk"
          VERSIONED_APK="build/app/outputs/${ASSET_NAME}"
          cp "$APK_PATH" "$VERSIONED_APK"

          RELEASE_TITLE="Solar Power Manager ${TAG_NAME}"
          NOTES="Automated release for ${TAG_NAME}.\nApp version: ${APP_VERSION}\nCommit: ${GITHUB_SHA}"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$VERSIONED_APK" --clobber
            gh release edit "$TAG_NAME" --title "$RELEASE_TITLE" --notes "$NOTES"
          else
            gh release create "$TAG_NAME" "$VERSIONED_APK" \
              --title "$RELEASE_TITLE" \
              --target "$GITHUB_SHA" \
              --notes "$NOTES"
          fi

