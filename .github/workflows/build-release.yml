name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag_name:
        description: 'The version tag to build and publish (e.g. v1.0.31)'
        required: false
        type: string

concurrency:
  group: release-channel
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Android release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=0
          for required_var in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!required_var:-}" ]]; then
              echo "::error::Missing required secret: ${required_var}"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

          mkdir -p android/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystore/release.keystore

          cat > android/key.properties <<EOF
          storeFile=../keystore/release.keystore
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Run tests
        run: flutter test

      - name: Clean stale build artifacts
        run: rm -rf build/app/outputs

      - name: Determine build version from tag
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ inputs.tag_name || github.ref_name }}"

          if [[ "$TAG_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            APP_VERSION_CORE="${BASH_REMATCH[1]}"
            IFS='.' read -r _major _minor _patch <<< "$APP_VERSION_CORE"
            APP_BUILD_NUMBER="$((10#${_major:-0} * 10000 + 10#${_minor:-0} * 100 + 10#${_patch:-0}))"
          else
            APP_VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
            APP_VERSION_CORE="${APP_VERSION%%+*}"
            APP_BUILD_NUMBER="${APP_VERSION#*+}"
            if [[ "$APP_BUILD_NUMBER" == "$APP_VERSION" ]]; then
              IFS='.' read -r _major _minor _patch <<< "$APP_VERSION_CORE"
              APP_BUILD_NUMBER="$((10#${_major:-0} * 10000 + 10#${_minor:-0} * 100 + 10#${_patch:-0}))"
            fi
          fi

          # Android requires a positive integer versionCode.
          if [[ "$APP_BUILD_NUMBER" -le 0 ]]; then
            IFS='.' read -r _major _minor _patch <<< "$APP_VERSION_CORE"
            APP_BUILD_NUMBER="$((10#${_major:-0} * 10000 + 10#${_minor:-0} * 100 + 10#${_patch:-0}))"
          fi

          APP_VERSION="${APP_VERSION_CORE}+${APP_BUILD_NUMBER}"
          SAFE_VERSION="${APP_VERSION//+/--build-}"

          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "APP_VERSION_CORE=${APP_VERSION_CORE}" >> "$GITHUB_ENV"
          echo "APP_BUILD_NUMBER=${APP_BUILD_NUMBER}" >> "$GITHUB_ENV"
          echo "SAFE_VERSION=${SAFE_VERSION}" >> "$GITHUB_ENV"

      - name: Build APK
        run: flutter build apk --release --split-per-abi --no-pub --build-name "$APP_VERSION_CORE" --build-number "$APP_BUILD_NUMBER"

      - name: Verify build output
        run: |
          set -euo pipefail
          echo "=== Android build directory structure ==="
          find build/app -type f -name '*.apk' 2>/dev/null | sort || echo "No APKs found"
          echo ""
          echo "=== Full outputs directory ==="
          find build/app/outputs -type f 2>/dev/null | sort | head -20 || echo "No outputs directory"

      - name: Publish APK to stable or beta release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_REF: ${{ inputs.tag_name || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${TAG_REF}"
          # APP_VERSION and SAFE_VERSION are computed earlier from the tag (or pubspec fallback).

          # Determine release channel:
          # vX.0.0 (minor=0 AND patch=0) → stable; everything else → beta
          version_core="${TAG_NAME#v}"
          IFS='.' read -r _major minor patch <<< "${version_core}"
          minor="${minor:-0}"
          patch="${patch:-0}"
          if [[ "$minor" == "0" && "$patch" == "0" ]]; then
            RELEASE_TAG="stable"
            RELEASE_TITLE="Stable — Solar Power Manager ${TAG_NAME}"
            PRERELEASE_BOOL="false"
          else
            RELEASE_TAG="beta"
            RELEASE_TITLE="Beta — Solar Power Manager ${TAG_NAME}"
            PRERELEASE_BOOL="true"
          fi

          NOTES="$(printf 'Version: %s\nTag: %s\nCommit: %s' "$APP_VERSION" "$TAG_NAME" "$GITHUB_SHA")"

          # Keep channel tags (`stable`/`beta`) deterministic and always
          # attached to the commit being published.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/${RELEASE_TAG}"

          mapfile -t APK_PATHS < <(find build/app/outputs -type f -name '*.apk' | sort)
          if [[ "${#APK_PATHS[@]}" -eq 0 ]]; then
            echo "No APK found under build/app/outputs"
            find build/app/outputs -maxdepth 5 -type f | sort
            exit 1
          fi

          mkdir -p build/app/github-release-assets
          assets=()
          for apk in "${APK_PATHS[@]}"; do
            base_name="$(basename "$apk")"
            abi="universal"
            for candidate in armeabi-v7a arm64-v8a x86_64 x86; do
              if [[ "$base_name" == *"${candidate}"* ]]; then
                abi="$candidate"
                break
              fi
            done
            versioned_apk="build/app/github-release-assets/solar-power-manager-${SAFE_VERSION}-${abi}.apk"
            cp "$apk" "$versioned_apk"
            assets+=("$versioned_apk")
          done

          # Create or update the channel release explicitly by tag.
          release_json="$(gh api "repos/${GH_REPO}/releases/tags/${RELEASE_TAG}" 2>/dev/null || true)"
          release_id="$(jq -r '.id // empty' <<< "$release_json")"

          if [[ -z "$release_id" ]]; then
            release_json="$(gh api -X POST "repos/${GH_REPO}/releases" \
              -f tag_name="$RELEASE_TAG" \
              -f target_commitish="$GITHUB_SHA" \
              -f name="$RELEASE_TITLE" \
              -f body="$NOTES" \
              -F prerelease="$PRERELEASE_BOOL")"
            release_id="$(jq -r '.id // empty' <<< "$release_json")"
          else
            release_json="$(gh api -X PATCH "repos/${GH_REPO}/releases/${release_id}" \
              -f target_commitish="$GITHUB_SHA" \
              -f name="$RELEASE_TITLE" \
              -f body="$NOTES" \
              -F prerelease="$PRERELEASE_BOOL")"
          fi

          # Read current assets first so we can clean stale files after a
          # successful upload.
          mapfile -t OLD_ASSETS < <(
            jq -r '.assets[]?.name' <<< "$release_json"
          )

          # Resolve upload URL from the release payload and use API uploads.
          release_id="$(jq -r '.id' <<< "$release_json")"
          upload_url_template="$(jq -r '.upload_url' <<< "$release_json")"
          upload_url_base="${upload_url_template%%\{*}"

          if [[ -z "$release_id" || "$release_id" == "null" || -z "$upload_url_base" || "$upload_url_base" == "null" ]]; then
            echo "Unable to resolve release metadata for ${RELEASE_TAG}"
            exit 1
          fi

          for uploaded_path in "${assets[@]}"; do
            asset_name="$(basename "$uploaded_path")"
            encoded_name="$(jq -rn --arg v "$asset_name" '$v|@uri')"
            upload_url="${upload_url_base}?name=${encoded_name}"

            # Replace same-named assets to keep channel release clean.
            existing_asset_id="$(
              gh api "repos/${GH_REPO}/releases/${release_id}/assets" 2>/dev/null \
                | jq -r --arg n "$asset_name" '.[] | select(.name == $n) | .id' \
                | head -n 1 || true
            )"
            if [[ -n "$existing_asset_id" ]]; then
              gh api --method DELETE "repos/${GH_REPO}/releases/assets/${existing_asset_id}"
            fi

            upload_attempt=1
            max_attempts=5
            until curl -fsSL \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/vnd.android.package-archive" \
              --data-binary @"${uploaded_path}" \
              "${upload_url}" >/dev/null; do
              if [[ "$upload_attempt" -ge "$max_attempts" ]]; then
                echo "Upload failed for ${asset_name} after ${max_attempts} attempts"
                exit 1
              fi
              upload_attempt=$((upload_attempt + 1))
              echo "Upload failed for ${asset_name}; retrying (${upload_attempt}/${max_attempts})..."
              sleep 3
            done
          done

          # Remove stale assets from previous versions, keeping only what was
          # just uploaded.
          for asset_name in "${OLD_ASSETS[@]:-}"; do
            [[ -z "$asset_name" ]] && continue
            keep_asset="false"
            for uploaded_path in "${assets[@]}"; do
              if [[ "$asset_name" == "$(basename "$uploaded_path")" ]]; then
                keep_asset="true"
                break
              fi
            done

            if [[ "$keep_asset" == "false" ]]; then
              gh release delete-asset "$RELEASE_TAG" "$asset_name" --repo "$GH_REPO" --yes
            fi
          done

