name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag_name:
        description: 'The version tag to build and publish (e.g. v1.0.31)'
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Clean stale build artifacts
        run: rm -rf build/app/outputs

      - name: Build APK
        run: flutter build apk --release --split-per-abi --no-pub

      - name: Verify build output
        run: |
          set -euo pipefail
          echo "=== Android build directory structure ==="
          find build/app -type f -name '*.apk' 2>/dev/null | sort || echo "No APKs found"
          echo ""
          echo "=== Full outputs directory ==="
          find build/app/outputs -type f 2>/dev/null | sort | head -20 || echo "No outputs directory"

      - name: Publish APK to stable or beta release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_REF: ${{ inputs.tag_name || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${TAG_REF}"
          APP_VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          SAFE_VERSION="${APP_VERSION//+/--build-}"

          # Determine release channel:
          # vX.0.0 (minor=0 AND patch=0) → stable; everything else → beta
          version_core="${TAG_NAME#v}"
          IFS='.' read -r _major minor patch <<< "${version_core}"
          minor="${minor:-0}"
          patch="${patch:-0}"
          if [[ "$minor" == "0" && "$patch" == "0" ]]; then
            RELEASE_TAG="stable"
            RELEASE_TITLE="Stable — Solar Power Manager ${TAG_NAME}"
            PRERELEASE_FLAG=""
          else
            RELEASE_TAG="beta"
            RELEASE_TITLE="Beta — Solar Power Manager ${TAG_NAME}"
            PRERELEASE_FLAG="--prerelease"
          fi

          NOTES="$(printf 'Version: %s\nTag: %s\nCommit: %s' "$APP_VERSION" "$TAG_NAME" "$GITHUB_SHA")"

          mapfile -t APK_PATHS < <(find build/app/outputs -type f -name '*.apk' | sort)
          if [[ "${#APK_PATHS[@]}" -eq 0 ]]; then
            echo "No APK found under build/app/outputs"
            find build/app/outputs -maxdepth 5 -type f | sort
            exit 1
          fi

          mkdir -p build/app/github-release-assets
          assets=()
          for apk in "${APK_PATHS[@]}"; do
            base_name="$(basename "$apk")"
            abi="universal"
            for candidate in armeabi-v7a arm64-v8a x86_64 x86; do
              if [[ "$base_name" == *"${candidate}"* ]]; then
                abi="$candidate"
                break
              fi
            done
            versioned_apk="build/app/github-release-assets/solar-power-manager-${SAFE_VERSION}-${abi}.apk"
            cp "$apk" "$versioned_apk"
            assets+=("$versioned_apk")
          done

          # Ensure the release exists (idempotent)
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes "$NOTES" \
              --target "$GITHUB_SHA" \
              ${PRERELEASE_FLAG}
          else
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes "$NOTES" \
              ${PRERELEASE_FLAG}
          fi

          # Remove all previous APK assets so old versions don't accumulate.
          # We collect names first, then delete each one, and only proceed to
          # upload if all deletes succeed — this prevents partial-replace states
          # that caused 404 errors on re-upload.
          mapfile -t OLD_ASSETS < <(
            gh release view "$RELEASE_TAG" --json assets -q '.assets[].name' 2>/dev/null || true
          )
          for asset_name in "${OLD_ASSETS[@]:-}"; do
            [[ -z "$asset_name" ]] && continue
            gh release delete-asset "$RELEASE_TAG" "$asset_name" --yes
          done

          # Upload the new APKs
          gh release upload "$RELEASE_TAG" "${assets[@]}"

