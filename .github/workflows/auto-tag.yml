name: Auto Tag Version

on:
  push:
    branches: ["master", "main"]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      was_created: ${{ steps.tag.outputs.was_created }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create next semantic tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          # If this commit is already tagged with a semantic version, do nothing.
          if git tag --points-at "$GITHUB_SHA" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Commit already has a version tag. Skipping."
            echo "was_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"

          if [[ -z "$latest_tag" ]]; then
            next_tag="v1.0.0"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            next_patch=$((patch + 1))
            next_tag="v${major}.${minor}.${next_patch}"
          fi

          git tag -a "$next_tag" -m "Release $next_tag" "$GITHUB_SHA"
          git push origin "$next_tag"

          echo "Created and pushed tag: $next_tag"
          echo "new_tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "was_created=true" >> "$GITHUB_OUTPUT"

  # Trigger CD directly — avoids the GitHub Actions restriction that prevents
  # a GITHUB_TOKEN-authored tag push from triggering other workflows.
  release:
    needs: tag
    if: needs.tag.outputs.was_created == 'true'
    uses: ./.github/workflows/build-release.yml
    secrets: inherit
    with:
      tag_name: ${{ needs.tag.outputs.new_tag }}
    permissions:
      contents: write
