import com.android.build.OutputFile

plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def resolveSigningValue = { String propertyKey, String envKey ->
    def value = keystoreProperties.getProperty(propertyKey)
    if (value == null || value.trim().isEmpty()) {
        value = System.getenv(envKey)
    }
    return value
}

def releaseStoreFilePath = resolveSigningValue("storeFile", "ANDROID_KEYSTORE_PATH")
def releaseStorePassword = resolveSigningValue("storePassword", "ANDROID_KEYSTORE_PASSWORD")
def releaseKeyAlias = resolveSigningValue("keyAlias", "ANDROID_KEY_ALIAS")
def releaseKeyPassword = resolveSigningValue("keyPassword", "ANDROID_KEY_PASSWORD")
def hasReleaseSigning = [releaseStoreFilePath, releaseStorePassword, releaseKeyAlias, releaseKeyPassword]
        .every { it != null && !it.trim().isEmpty() }

android {
    namespace = "com.fabbro.solarpowermanager"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "com.fabbro.solarpowermanager"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile = file(releaseStoreFilePath)
                storePassword = releaseStorePassword
                keyAlias = releaseKeyAlias
                keyPassword = releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            // Use a stable release key when available; fallback to debug for local/dev builds only.
            signingConfig = hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def abi = output.getFilter(OutputFile.ABI)
            def abiSuffix = abi != null ? "-${abi}" : ""
            output.outputFileName =
                    "solar-power-manager${abiSuffix}-${variant.versionName}-${variant.buildType.name}.apk"
        }
    }

    packagingOptions {
        pickFirst 'META-INF/com/android/build/gradle/app-metadata.properties'
    }
}

if ((System.getenv("CI") ?: "false").toBoolean() && !hasReleaseSigning) {
    throw new GradleException(
            "Release signing is not configured. Provide android/key.properties or ANDROID_KEYSTORE_PATH, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
    )
}

flutter {
    source = "../.."
}
